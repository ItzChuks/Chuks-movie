<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — CineVault</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#07070e',
            surface: '#0f0f1a',
            card:    '#161625',
            accent:  '#f0a500',
            muted:   '#7777aa',
          },
          fontFamily: {
            display: ['"Bebas Neue"', 'cursive'],
            body:    ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="min-h-screen">

  <!-- NAVBAR -->
  <nav id="mainNav" class="nav-glass fixed top-0 left-0 right-0 z-50 px-4 md:px-8 py-3 transition-shadow">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 group">
        <div class="w-8 h-8 bg-accent rounded flex items-center justify-center group-hover:scale-110 transition-transform">
          <svg class="w-5 h-5 text-gray-900" fill="currentColor" viewBox="0 0 24 24">
            <path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/>
          </svg>
        </div>
        <span class="font-display text-2xl tracking-widest text-accent leading-none">CINEVAULT</span>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="text-gray-400 hover:text-white transition text-sm uppercase tracking-widest">Home</a>
        <a href="search.html?type=movie" class="text-gray-400 hover:text-white transition text-sm uppercase tracking-widest">Movies</a>
        <a href="search.html?type=tv" class="text-gray-400 hover:text-white transition text-sm uppercase tracking-widest">TV Shows</a>
      </div>
      <div class="flex items-center gap-2">
        <a href="search.html" class="p-2 rounded-full hover:bg-white/10 transition text-gray-400 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </a>
        <button onclick="toggleMobileMenu()" class="md:hidden p-2 rounded-full hover:bg-white/10 transition text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="mobileMenu" class="hidden md:hidden mt-2 pb-3 border-t border-white/5">
      <div class="flex flex-col pt-3 px-2 gap-1">
        <a href="index.html"             class="text-gray-300 py-2 px-4 rounded-lg hover:bg-white/5 text-sm">Home</a>
        <a href="search.html?type=movie" class="text-gray-300 py-2 px-4 rounded-lg hover:bg-white/5 text-sm">Movies</a>
        <a href="search.html?type=tv"    class="text-gray-300 py-2 px-4 rounded-lg hover:bg-white/5 text-sm">TV Shows</a>
      </div>
    </div>
  </nav>

  <!-- BACKDROP HERO AREA -->
  <div class="relative" style="height: 320px; margin-top: 0;">
    <div id="movieBg" class="absolute inset-0 bg-cover bg-center bg-[#07070e]"></div>
    <div class="absolute inset-0" style="background: linear-gradient(to bottom, rgba(7,7,14,0.3) 0%, rgba(7,7,14,1) 100%)"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="max-w-7xl mx-auto px-4 md:px-8 -mt-24 relative z-10 pb-20">

    <!-- Back button -->
    <div class="mb-6">
      <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back
      </a>
    </div>

    <!-- Content injected by movie.js -->
    <div id="movieContent">
      <!-- Loading skeleton -->
      <div class="flex flex-col md:flex-row gap-8 mb-10">
        <div class="skeleton flex-shrink-0 w-48 md:w-56 rounded-xl mx-auto md:mx-0" style="aspect-ratio:2/3"></div>
        <div class="flex-1 pt-4">
          <div class="skeleton h-5 w-32 rounded-full mb-3"></div>
          <div class="skeleton h-12 w-3/4 rounded mb-3"></div>
          <div class="skeleton h-4 w-40 rounded mb-4"></div>
          <div class="skeleton h-4 w-full rounded mb-2"></div>
          <div class="skeleton h-4 w-4/5 rounded mb-2"></div>
          <div class="skeleton h-4 w-3/5 rounded mb-6"></div>
          <div class="flex gap-3">
            <div class="skeleton h-12 w-40 rounded-xl"></div>
            <div class="skeleton h-12 w-36 rounded-xl"></div>
          </div>
        </div>
      </div>
      <div class="skeleton h-48 rounded-2xl mb-8"></div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="border-t border-white/5 py-8 px-6">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <a href="index.html" class="font-display text-2xl text-accent tracking-widest">CINEVAULT</a>
      <p class="text-xs text-gray-600">© 2026 CineVault. Movie data provided by TMDB.</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/tmdb.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/movie.js"></script>
</body>
</html>
